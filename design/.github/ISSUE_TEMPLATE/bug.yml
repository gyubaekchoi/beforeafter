name: 'Bug Report'
title: 'Bug: '
description: Report a bug in WDS
labels:
  - 'bug'
body:
  - type: textarea
    attributes:
      label: Summary
      description: Provide a brief summary of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Describe the steps to reproduce the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual Behavior
      description: Describe what actually happened.
    validations:
      required: true
  - type: input
    attributes:
      label: WDS Version
      description: Which version of WDS are you using?
      placeholder: e.g. 3.0.0
    validations:
      required: true
  - type: input
    attributes:
      label: Browser
      description: Browser name and version.
      placeholder: e.g. Chrome 120
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional Information
      description: Any additional context, screenshots, or error logs.
    validations:
      required: false
