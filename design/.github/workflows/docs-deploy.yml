name: Docs deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - 'figma/**'
  workflow_dispatch:
    inputs:
      algolia:
        description: Run algolia crawler
        required: false
        default: false
        type: boolean
      server_type:
        description: Server type
        required: false
        default: 'dev'
        type: choice
        options:
          - 'www'
          - 'dev'
      version_path:
        description: 'Versioned docs path (e.g., 3.4.x)'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      server_type:
        description: Server type
        required: false
        default: 'dev'
        type: string
      version_path:
        description: 'Versioned docs path (e.g., 3.4.x). When set, deploys to /{version_path}/ instead of root.'
        required: false
        default: ''
        type: string
      ref:
        description: 'Branch/tag/sha to checkout. Defaults to the workflow ref.'
        required: false
        default: ''
        type: string
      algolia:
        description: Run algolia crawler
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: 22.18.0
  AWS_REGION: ap-northeast-2
  BUCKET: montage.wanted.co.kr
  DEV_BUCKET: dev-montage.wanted.co.kr
  SERVER_TYPE: ${{ inputs.server_type }}

  CLOUDFRONT_DISTRIBUTION_ID: E43YG4RN0PRN4
  DEV_CLOUDFRONT_DISTRIBUTION_ID: E39V7XGT2FMQNT

permissions:
  id-token: write
  contents: read

jobs:
  set-env:
    name: Set Env
    if: "${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false && !contains(github.event.pull_request.labels.*.name, 'ci: skip document deploy')) }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set Environment Variable
        id: env-vars
        run: |
          SERVER_TYPE=$SERVER_TYPE
          SHORT_COMMIT_HASH=$(git rev-parse --short HEAD)

          if [ "${{ github.event_name == 'pull_request' }}" = "true" ]; then
            SERVER_TYPE=dev
            IS_PREVIEW=true
          else
            IS_PREVIEW=false
          fi

          if [ "$SERVER_TYPE" = "dev" ]; then
            BUCKET=$DEV_BUCKET
            CLOUDFRONT_DISTRIBUTION_ID=$DEV_CLOUDFRONT_DISTRIBUTION_ID
          else
            BUCKET=$BUCKET
            CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_DISTRIBUTION_ID
          fi

          echo "IS_PREVIEW=$IS_PREVIEW" >> $GITHUB_OUTPUT
          echo "BUCKET=$BUCKET" >> $GITHUB_OUTPUT
          echo "SHORT_COMMIT_HASH=$SHORT_COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_OUTPUT
          echo "SERVER_TYPE=$SERVER_TYPE" >> $GITHUB_OUTPUT
          echo "CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          echo "VERSION_PATH=${{ inputs.version_path }}" >> $GITHUB_OUTPUT
    outputs:
      is_preview: ${{ steps.env-vars.outputs.IS_PREVIEW }}
      node_version: ${{ steps.env-vars.outputs.NODE_VERSION }}
      short_commit_hash: ${{ steps.env-vars.outputs.SHORT_COMMIT_HASH }}
      aws_region: ${{ steps.env-vars.outputs.AWS_REGION }}
      bucket: ${{ steps.env-vars.outputs.BUCKET }}
      cloudfront_distribution_id: ${{ steps.env-vars.outputs.CLOUDFRONT_DISTRIBUTION_ID }}
      server_type: ${{ steps.env-vars.outputs.SERVER_TYPE }}
      version_path: ${{ steps.env-vars.outputs.VERSION_PATH }}

  deploy-docs:
    needs: [set-env]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Build packages
        uses: ./.github/actions/package-build
        with:
          cache: true

      - name: Build React
        run: |
          pnpm run build

          if [ "${{ needs.set-env.outputs.is_preview }}" = "true" ]; then
            NEXT_PUBLIC_SERVER_TYPE=${{ needs.set-env.outputs.server_type }} PREVIEW_HASH=${{ needs.set-env.outputs.short_commit_hash }} pnpm -F docs build
          elif [ -n "${{ needs.set-env.outputs.version_path }}" ]; then
            NEXT_PUBLIC_SERVER_TYPE=${{ needs.set-env.outputs.server_type }} VERSION_PATH=${{ needs.set-env.outputs.version_path }} pnpm -F docs build
          else
            NEXT_PUBLIC_SERVER_TYPE=${{ needs.set-env.outputs.server_type }} pnpm -F docs build
          fi

      - name: Configure AWS credentials DEV
        if: ${{ startsWith(needs.set-env.outputs.server_type, 'dev') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region: ap-northeast-2

      - name: Configure AWS credentials
        if: ${{ !startsWith(needs.set-env.outputs.server_type, 'dev') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ap-northeast-2

      - name: Upload assets to S3
        run: |
          echo "build files to s3"

          if [ "${{ needs.set-env.outputs.is_preview }}" = "true" ]; then
            S3_PATH="s3://${{ needs.set-env.outputs.bucket }}/${{ needs.set-env.outputs.short_commit_hash }}"
            CLOUDFRONT_PATH="/${{ needs.set-env.outputs.short_commit_hash }}/*"
          elif [ -n "${{ needs.set-env.outputs.version_path }}" ]; then
            S3_PATH="s3://${{ needs.set-env.outputs.bucket }}/${{ needs.set-env.outputs.version_path }}"
            CLOUDFRONT_PATH="/${{ needs.set-env.outputs.version_path }}/*"
          else
            S3_PATH="s3://${{ needs.set-env.outputs.bucket }}"
            CLOUDFRONT_PATH="/*"
          fi

          aws s3 sync docs/out $S3_PATH --exclude "*.html" --exclude "*.txt"
          aws s3 sync docs/out $S3_PATH --exclude "*" --include "*.html" --include "*.txt" --cache-control "no-cache, no-store, must-revalidate"
          aws cloudfront create-invalidation --distribution-id ${{ needs.set-env.outputs.cloudfront_distribution_id }} --paths "$CLOUDFRONT_PATH"

  create-pull-request-comment:
    needs: [set-env, deploy-docs]
    runs-on: ubuntu-latest
    if: ${{ needs.set-env.outputs.is_preview == 'true' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
      - name: Get existing comment ID
        id: get-comment
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | startswith("## 🚀 Preview")) | .id' | head -n 1)

          if [ -n "$COMMENT_ID" ]; then
            echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
          else
            echo "comment_id=" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create or Update Pull Request Comment
        run: |
          DEPLOY_URL="https://dev-montage.wanted.co.kr/${{ needs.set-env.outputs.short_commit_hash }}"
          COMMIT_HASH="${{ needs.set-env.outputs.short_commit_hash }}"

          COMMENT_BODY=$'## 🚀 Preview\n\n<table><tbody><tr><td><strong>Last commit</strong></td><td>'"$COMMIT_HASH"'</td></tr><tr><td><strong>Preview URL</strong></td><td><a href="'"$DEPLOY_URL"'">'"$DEPLOY_URL"'</a></td></tr></tbody></table>'

          if [ -n "${{ steps.get-comment.outputs.comment_id }}" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ steps.get-comment.outputs.comment_id }} \
              -X PATCH -f body="$COMMENT_BODY"
            echo "Updated existing comment"
          else
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -X POST -f body="$COMMENT_BODY"
            echo "Created new comment"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}

  algolia:
    needs: [deploy-docs]
    if: ${{ inputs.algolia && inputs.server_type == 'www' }}
    runs-on: ubuntu-latest

    steps:
      - name: Push indices to Algolia
        id: algolia-crawler
        uses: algolia/algoliasearch-crawler-github-actions@v1.0.10
        with:
          crawler-user-id: ${{ secrets.CRAWLER_USER_ID }}
          crawler-api-key: ${{ secrets.CRAWLER_API_KEY }}
          algolia-app-id: ${{ secrets.APPLICATION_ID }}
          algolia-api-key: ${{ secrets.API_KEY }}
          site-url: https://montage.wanted.co.kr
          crawler-name: Montage Crawler
