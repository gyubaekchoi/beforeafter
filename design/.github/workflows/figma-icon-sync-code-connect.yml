name: Code Connect Publish And Icon/Figma Sync
on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'code connect push 여부'
        type: choice
        required: false
        default: 'true'
        options:
          - 'true'
          - 'false'

env:
  NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
  FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}

permissions:
  packages: write
  contents: write
  pull-requests: write

jobs:
  sync:
    uses: wanteddev/montage-web/.github/workflows/figma-icon-sync.yml@main
    with:
      output_dir: output
    secrets: inherit

  create-pull-request:
    needs: sync
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Restore cached Primes
        id: cache-primes-restore
        uses: actions/cache/restore@v4
        with:
          path: output
          key: ${{ needs.sync.outputs.figma-output-cache-key }}

      - uses: ./.github/actions/pnpm-install
      - run: node scripts/figma-icon.mjs

      - name: Get GitHub App user info
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          if [ -z "$USER_ID" ]; then
            echo "Failed to resolve GitHub App user ID for ${APP_SLUG}[bot]" >&2
            exit 1
          fi
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - run: git config user.name "${{ steps.app-user.outputs.name }}"
      - run: git config user.email "${{ steps.app-user.outputs.email }}"

      - name: Create Branch And Commit
        run: |
          git branch feature/code-connect/${{ github.run_id }}
          git checkout feature/code-connect/${{ github.run_id }}
          git add .
          git commit -m "feat(wds-icon): add icons synced from figma" --no-verify
          git push origin feature/code-connect/${{ github.run_id }}

      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Create New PR
        run: |
          gh pr create -B ${{ steps.extract_branch.outputs.branch }} -H feature/code-connect/${{ github.run_id }} --title "feat(wds,wds-icon): icon figma sync and new code connect publish" --body "add icons synced from figma"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}

  publish:
    needs: create-pull-request
    if: ${{ inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Build packages
        uses: ./.github/actions/package-build

      - name: Publish
        run: pnpm run publish:codeconnect --token ${{ env.FIGMA_TOKEN }} --skip-validation --batch-size 50
