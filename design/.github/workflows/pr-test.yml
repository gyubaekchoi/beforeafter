name: PR Test and Size Limit

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'figma/**'
      - '.github/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  size-limit:
    if: "${{ github.event.pull_request.draft == false && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci: skip test') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Build packages
        uses: ./.github/actions/package-build
        with:
          cache: false

      - name: Run Size Limit
        uses: andresz1/size-limit-action@v1.8.0
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          package_manager: pnpm
          skip_step: build

  unit-test:
    if: "${{ github.event.pull_request.draft == false && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci: skip test') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Build packages
        uses: ./.github/actions/package-build
        with:
          cache: false

      - name: Run Unit Test
        run: pnpm run test:unit --silent --no-cache

  visual-test:
    if: "${{ github.event.pull_request.draft == false && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci: skip test') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Build packages
        uses: ./.github/actions/package-build
        with:
          cache: false

      - name: Install playwright
        run: pnpm dlx playwright@1.56.1 install chromium

      - name: Run Visual Test
        run: pnpm run test:visual

  commonjs-test:
    if: "${{ github.event.pull_request.draft == false && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci: skip test') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Build packages
        uses: ./.github/actions/package-build
        with:
          cache: false

      - name: Run CommonJS Test
        run: pnpm run test:commonjs

  tree-shaking-test:
    if: "${{ github.event.pull_request.draft == false && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci: skip test') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Build packages
        uses: ./.github/actions/package-build
        with:
          cache: false

      - name: Run Tree Shaking Test
        run: pnpm run test:treeshaking
