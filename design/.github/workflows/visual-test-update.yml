name: Visual Test Update screenshots

on:
  workflow_dispatch:

jobs:
  update-screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Build packages
        uses: ./.github/actions/package-build

      - name: Install playwright
        run: pnpm dlx playwright@1.56.1 install chromium

      - name: Run Visual Test and update screenshots
        run: pnpm run test:visual --update

      - name: Get GitHub App user info
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          if [ -z "$USER_ID" ]; then
            echo "Failed to resolve GitHub App user ID for ${APP_SLUG}[bot]" >&2
            exit 1
          fi
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Create Branch And Commit
        run: |
          git config user.name "${{ steps.app-user.outputs.name }}"
          git config user.email "${{ steps.app-user.outputs.email }}"
          git add .
          git commit -m "chore(ci): update visual test screenshots" --no-verify
          git push origin ${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
