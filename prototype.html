<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B&A 리뷰 디자인 프로토타입</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f3f4f6; }
    .wanted-blue { color: #3366FF; }
    .bg-wanted-blue { background-color: #3366FF; }
    .border-wanted-blue { border-color: #3366FF; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Components ---

    const Header = ({ title }) => (
      <header className="flex items-center px-4 py-4 bg-white border-b border-gray-200 sticky top-0 z-10">
        <svg className="w-6 h-6 text-gray-800 mr-4 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
        <h1 className="text-lg font-semibold text-gray-900">{title}</h1>
      </header>
    );

    const ReviewFormScreen = () => {
      const [rating, setRating] = useState(0);

      return (
        <div className="max-w-md mx-auto bg-white min-h-screen pb-20 shadow-sm relative">
          <Header title="장기 사용 (B&A) 리뷰 작성" />
          
          <div className="p-5">
            <h2 className="text-sm text-gray-500 mb-4">시카 진정 크림 50ml</h2>
            
            {/* Guideline Box */}
            <div className="bg-blue-50 border border-blue-100 rounded-lg p-4 mb-6 flex items-start gap-3">
              <span className="text-2xl">💡</span>
              <div>
                <h3 className="text-sm font-semibold text-blue-900 mb-1">어떻게 찍어야 하나요?</h3>
                <p className="text-xs text-blue-800 leading-relaxed">동일한 조명, 동일한 각도에서 찍은 사진을 올려주세요. (Before 사진은 첫 구매 시점의 사진을 권장합니다.)</p>
              </div>
            </div>

            {/* Photo Upload Area */}
            <div className="mb-6">
              <h3 className="text-sm font-semibold text-gray-900 mb-3">1. 사진 등록 <span className="text-red-500">*</span></h3>
              <div className="flex gap-3">
                <div className="flex-1 aspect-square rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center bg-gray-50 cursor-pointer hover:border-blue-400 transition-colors">
                  <svg className="w-8 h-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                  <span className="text-sm font-medium text-gray-700">Before</span>
                  <span className="text-xs text-gray-400 mt-1">사용 전</span>
                </div>
                <div className="flex-1 aspect-square rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center bg-gray-50 cursor-pointer hover:border-blue-400 transition-colors">
                  <svg className="w-8 h-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                  <span className="text-sm font-medium text-gray-700">After</span>
                  <span className="text-xs text-gray-400 mt-1">사용 후</span>
                </div>
              </div>
              <p className="text-xs text-gray-500 mt-2">두 장의 사진이 모두 등록되어야 B&A 리뷰로 인정됩니다.</p>
            </div>

            {/* Rating Area */}
            <div className="mb-6">
              <h3 className="text-sm font-semibold text-gray-900 mb-3">2. 제품은 어떠셨나요? <span className="text-red-500">*</span></h3>
              <div className="flex gap-2">
                {[1,2,3,4,5].map(star => (
                  <svg key={star} onClick={() => setRating(star)} className={`w-10 h-10 cursor-pointer ${rating >= star ? 'text-yellow-400' : 'text-gray-200'}`} fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                ))}
              </div>
            </div>

            {/* Text Review */}
            <div className="mb-8">
              <h3 className="text-sm font-semibold text-gray-900 mb-3">3. 상세 리뷰 작성 <span className="text-red-500">*</span></h3>
              <textarea 
                className="w-full border border-gray-300 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none" 
                rows="5" 
                placeholder="한 달 동안 사용하면서 피부에 어떤 변화가 있었나요? 자세한 후기를 남겨주세요."
              ></textarea>
            </div>
          </div>

          {/* Bottom Fixed Button */}
          <div className="fixed bottom-0 max-w-md w-full bg-white border-t border-gray-200 p-4">
            <button className="w-full bg-wanted-blue text-white font-semibold py-4 rounded-xl text-base hover:bg-blue-700 transition-colors">
              1,500원 받고 등록하기
            </button>
          </div>
        </div>
      );
    };

    const ReviewWidgetScreen = () => {
      return (
        <div className="max-w-md mx-auto bg-gray-50 min-h-screen py-10 px-4">
          <h2 className="text-xl font-bold text-gray-900 mb-6 px-2">베스트 장기 사용(B&A) 리뷰</h2>
          
          {/* Review Card */}
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            {/* User Info */}
            <div className="flex items-start justify-between mb-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0 overflow-hidden">
                  <img src="https://i.pravatar.cc/150?img=1" alt="user" className="w-full h-full object-cover"/>
                </div>
                <div>
                  <div className="flex items-center gap-2">
                    <span className="font-semibold text-gray-900 text-sm">user***</span>
                    <span className="text-yellow-400 text-xs">★★★★★</span>
                  </div>
                  <div className="text-xs text-gray-500 mt-0.5">건성 / 홍조 고민</div>
                </div>
              </div>
              {/* B&A Badge */}
              <div className="bg-blue-50 border border-blue-200 text-wanted-blue text-xs font-bold px-2 py-1 rounded-md flex items-center gap-1">
                <span>💰</span> B&A 리뷰
              </div>
            </div>

            {/* B&A Images Split Screen */}
            <div className="flex gap-1 mb-4 rounded-xl overflow-hidden relative">
              <div className="flex-1 relative aspect-square bg-gray-200">
                <img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="before" className="w-full h-full object-cover" />
                <div className="absolute top-2 left-2 bg-black bg-opacity-60 text-white text-[10px] font-bold px-2 py-1 rounded">BEFORE</div>
              </div>
              <div className="flex-1 relative aspect-square bg-gray-200">
                <img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="after" className="w-full h-full object-cover grayscale-[20%] brightness-110" />
                <div className="absolute top-2 left-2 bg-black bg-opacity-60 text-white text-[10px] font-bold px-2 py-1 rounded">AFTER</div>
              </div>
            </div>

            {/* Review Text */}
            <p className="text-sm text-gray-800 leading-relaxed mb-4">
              처음 샀을 때 찍어둔 사진이랑 4주 쓰고 난 뒤 사진이랑 비교해보니 붉은기가 진짜 많이 가라앉았어요. 처음엔 긴가민가 했는데 이렇게 두 장을 붙여서 보니까 효과가 확실하네요. 대박입니다!
            </p>

            {/* Helpful Button */}
            <div className="flex items-center gap-2">
              <button className="flex items-center gap-1 border border-gray-200 rounded-full px-3 py-1.5 hover:bg-gray-50 transition-colors">
                <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5" /></svg>
                <span className="text-xs font-medium text-gray-600">도움이 됐어요</span>
                <span className="text-xs font-bold text-gray-900 ml-1">12</span>
              </button>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [view, setView] = useState('form');

      return (
        <div className="bg-gray-200 min-h-screen font-sans">
          {/* View Toggle (For Demo Purposes) */}
          <div className="fixed top-4 right-4 z-50 flex gap-2">
            <button 
              onClick={() => setView('form')}
              className={`px-4 py-2 rounded-full text-sm font-bold shadow-md transition-colors ${view === 'form' ? 'bg-gray-900 text-white' : 'bg-white text-gray-600'}`}
            >
              리뷰 작성 폼
            </button>
            <button 
              onClick={() => setView('widget')}
              className={`px-4 py-2 rounded-full text-sm font-bold shadow-md transition-colors ${view === 'widget' ? 'bg-gray-900 text-white' : 'bg-white text-gray-600'}`}
            >
              리뷰 노출 위젯
            </button>
          </div>

          {view === 'form' ? <ReviewFormScreen /> : <ReviewWidgetScreen />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
